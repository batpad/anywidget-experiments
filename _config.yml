# JupyterBook configuration (for backwards compatibility)
# Main configuration is in myst.yml

title: Anywidget Composable Geospatial Widgets
author: Anywidget Experiments Team
logo: ""

# Force re-execution of notebooks on each build
execute:
  execute_notebooks: force
  timeout: 600
  allow_errors: false

# HTML output options
html:
  favicon: ""
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
  home_page_in_navbar: true
  
# Repository settings
repository:
  url: https://github.com/yourusername/anywidget-experiments
  path_to_book: .
  branch: main

# Launch buttons
launch_buttons:
  notebook_interface: jupyterlab
  binderhub_url: ""
  colab_url: ""

# Advanced settings
sphinx:
  extra_extensions:
    - myst_nb
  config:
    html_js_files:
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js
    nb_render_priority:
      html:
        - "application/vnd.jupyter.widget-view+json"
        - "application/javascript" 
        - "text/html"
        - "text/latex"
        - "image/svg+xml"
        - "image/png"
        - "image/jpeg"
        - "text/markdown"
        - "text/plain"
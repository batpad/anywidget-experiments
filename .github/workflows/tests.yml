name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run plugin tests
        run: npm test

      # Builds every bundled widget (chart_widget, chartgpu_widget,
      # typed_counter). Catches regressions in the esbuild pipeline and the
      # TypeScript widget's source — both go silent at static-export time
      # since the plugin only reads dist/widget.js.
      - name: Install widget dependencies
        run: npm run install-widgets

      - name: Build all bundled widgets
        run: npm run build-widgets

      - name: Type-check the TypeScript widget
        run: npm run typecheck --prefix widgets/typed_counter
